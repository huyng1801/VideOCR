name: Build Windows (x64)

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Optional release type suffix (e.g., Beta, RC1)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set requests
          pip install av "scikit-image" opencc opencv-python-headless ^
            psutil pymediainfo "PySimpleGUI-4-foss" thefuzz wakepy ^
            "wordninja-enhanced" plyer winotify

      - name: Compile GUI with Nuitka
        run: python -m nuitka --assume-yes-for-downloads VideOCR.py

      - name: Compile CLI with Nuitka
        working-directory: CLI
        run: python -m nuitka --assume-yes-for-downloads videocr_cli.py

      - name: Read app version
        id: version
        run: |
          $version = python -c "from _version import __version__; print(__version__)"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Smoke-test compiled binaries
        run: |
          echo "=== Test CLI binary ==="
          & "CLI\videocr_cli.dist\videocr-cli.exe" --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          
          echo "=== Test GUI binary exists ==="
          if (-not (Test-Path "VideOCR.dist\VideOCR.exe")) { 
            Write-Output "ERROR: GUI binary not found"
            exit 1 
          }
          
          echo "=== Verify languages directory is bundled ==="
          if (-not (Test-Path "VideOCR.dist\languages\en.json")) { 
            Write-Output "ERROR: languages dir not bundled"
            exit 1 
          }
          
          echo "All smoke tests passed."

      - name: Package binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          $suffix = ""
          if ("${{ env.RELEASE_TYPE }}" -ne "") {
            $suffix = "-${{ env.RELEASE_TYPE }}"
          }
          
          $gui_folder = "VideOCR-v${{ env.VERSION }}${suffix}-Windows-x64"
          $cli_folder = "videocr-cli-CPU-v${{ env.VERSION }}"
          
          # Create release directory
          if (-not (Test-Path "Releases")) { New-Item -ItemType Directory "Releases" }
          
          # Copy GUI to releases folder
          Copy-Item "VideOCR.dist" "Releases\$gui_folder" -Recurse
          
          # Copy CLI inside GUI where find_videocr_program() looks
          Copy-Item "CLI\videocr_cli.dist" "Releases\$gui_folder\$cli_folder" -Recurse
          
          # Create zip file for GUI
          Compress-Archive -Path "Releases\$gui_folder" -DestinationPath "Releases\$gui_folder.zip"
          
          # Create zip file for CLI standalone
          $cli_zip_folder = "videocr-cli-CPU-v${{ env.VERSION }}-Windows-x64"
          Copy-Item "CLI\videocr_cli.dist" "Releases\$cli_zip_folder" -Recurse
          Compress-Archive -Path "Releases\$cli_zip_folder" -DestinationPath "Releases\$cli_zip_folder.zip"
          Remove-Item "Releases\$cli_zip_folder" -Recurse

      - name: Verify final packages
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          $suffix = ""
          if ("${{ env.RELEASE_TYPE }}" -ne "") {
            $suffix = "-${{ env.RELEASE_TYPE }}"
          }
          
          $gui_folder = "VideOCR-v${{ env.VERSION }}${suffix}-Windows-x64"
          $cli_folder = "videocr-cli-CPU-v${{ env.VERSION }}"
          
          echo "=== Verify GUI zip exists ==="
          if (-not (Test-Path "Releases\$gui_folder.zip")) { 
            Write-Output "ERROR: GUI zip not created"
            exit 1 
          }
          Get-ChildItem "Releases\$gui_folder.zip" | Format-List Length
          
          echo "=== Verify CLI is inside GUI ==="
          if (-not (Test-Path "Releases\$gui_folder\$cli_folder\videocr-cli.exe")) { 
            Write-Output "ERROR: CLI binary not found inside GUI folder"
            exit 1 
          }
          
          echo "=== Verify CLI standalone zip exists ==="
          $cli_zip_folder = "videocr-cli-CPU-v${{ env.VERSION }}-Windows-x64"
          if (-not (Test-Path "Releases\$cli_zip_folder.zip")) { 
            Write-Output "ERROR: CLI zip not created"
            exit 1 
          }
          Get-ChildItem "Releases\$cli_zip_folder.zip" | Format-List Length
          
          echo "Final package verification passed."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VideOCR-Windows-x64
          path: Releases/*.zip
          if-no-files-found: error
