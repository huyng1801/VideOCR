name: Build macOS (Apple Silicon)

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Optional release type suffix (e.g., Beta, RC1)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          brew install mediainfo tcl-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka ordered-set requests
          pip install av "scikit-image" opencc opencv-python-headless \
            psutil pymediainfo "PySimpleGUI-4-foss" thefuzz wakepy \
            "wordninja-enhanced" plyer

      - name: Compile GUI with Nuitka
        run: python -m nuitka --assume-yes-for-downloads VideOCR.py

      - name: Compile CLI with Nuitka
        working-directory: CLI
        run: python -m nuitka --assume-yes-for-downloads videocr_cli.py

      - name: Read app version
        id: version
        run: echo "version=$(python -c 'from _version import __version__; print(__version__)')" >> "$GITHUB_OUTPUT"

      - name: Smoke-test compiled binaries
        run: |
          echo "=== Test CLI binary ==="
          CLI/videocr_cli.dist/videocr-cli --help
          echo "CLI exited with $?"

          echo "=== Test GUI binary exists and is executable ==="
          test -f "VideOCR.app/Contents/MacOS/VideOCR" || { echo "ERROR: GUI binary not found"; exit 1; }
          test -x "VideOCR.app/Contents/MacOS/VideOCR" || { echo "ERROR: GUI binary not executable"; exit 1; }

          echo "=== Verify bundle structure ==="
          ls -la "VideOCR.app/Contents/MacOS/"
          test -f "VideOCR.app/Contents/MacOS/languages/en.json" || { echo "ERROR: languages dir not bundled"; exit 1; }

          echo "All smoke tests passed."

      - name: Package and sign .app bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          SUFFIX=""
          if [ -n "$RELEASE_TYPE" ]; then
            SUFFIX="-$RELEASE_TYPE"
          fi

          APP_NAME="VideOCR-v${VERSION}${SUFFIX}-macOS-arm64"
          CLI_FOLDER="videocr-cli-CPU-v${VERSION}"

          # Embed CLI inside the .app bundle where find_videocr_program() looks:
          # APP_DIR = VideOCR.app/Contents/MacOS/
          mv CLI/videocr_cli.dist "VideOCR.app/Contents/MacOS/${CLI_FOLDER}"

          # codesign treats every directory inside Contents/MacOS/ as a "nested bundle".
          # The Nuitka flat dist folder has no Info.plist → "bundle format unrecognized".
          # Fix: inject a minimal Info.plist so codesign can accept it as a valid tool bundle.
          cat > "VideOCR.app/Contents/MacOS/${CLI_FOLDER}/Info.plist" << PLIST_EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>videocr-cli</string>
    <key>CFBundleIdentifier</key>
    <string>com.videocr.cli</string>
    <key>CFBundlePackageType</key>
    <string>TOOL</string>
    <key>CFBundleVersion</key>
    <string>${VERSION}</string>
</dict>
</plist>
PLIST_EOF

          # Sign bottom-up: libraries → CLI executable → CLI bundle → GUI binary → outer .app
          # Step 1: sign all .dylib and .so files inside the entire .app tree
          find "VideOCR.app" -type f \( -name "*.dylib" -o -name "*.so" \) \
            -exec codesign --force --sign - {} \;
          # Step 2: sign the CLI executable
          codesign --force --sign - "VideOCR.app/Contents/MacOS/${CLI_FOLDER}/videocr-cli"
          # Step 3: sign the CLI flat bundle (now valid thanks to Info.plist)
          codesign --force --sign - "VideOCR.app/Contents/MacOS/${CLI_FOLDER}"
          # Step 4: sign the GUI binary
          codesign --force --sign - "VideOCR.app/Contents/MacOS/VideOCR"
          # Step 5: sign the outer .app (all subcomponents already signed)
          codesign --force --sign - "VideOCR.app"

          mkdir -p Releases
          mv "VideOCR.app" "Releases/${APP_NAME}.app"

          # Use ditto to create a zip that preserves macOS metadata
          ditto -c -k --keepParent "Releases/${APP_NAME}.app" "Releases/${APP_NAME}.zip"

      - name: Verify codesign and final bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          SUFFIX=""
          if [ -n "$RELEASE_TYPE" ]; then
            SUFFIX="-$RELEASE_TYPE"
          fi
          APP_NAME="VideOCR-v${VERSION}${SUFFIX}-macOS-arm64"

          echo "=== Verify codesign ==="
          codesign -v --deep "Releases/${APP_NAME}.app" && echo "codesign OK"

          echo "=== Verify zip exists ==="
          test -f "Releases/${APP_NAME}.zip" || { echo "ERROR: zip not created"; exit 1; }
          ls -lh "Releases/${APP_NAME}.zip"

          echo "=== Verify CLI is inside .app ==="
          CLI_FOLDER="videocr-cli-CPU-v${VERSION}"
          test -f "Releases/${APP_NAME}.app/Contents/MacOS/${CLI_FOLDER}/videocr-cli" \
            || { echo "ERROR: CLI binary not found inside .app bundle"; exit 1; }

          echo "Final bundle verification passed."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideOCR-macOS-arm64
          path: Releases/*.zip
          if-no-files-found: error
